apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-30"
spec:
  destination:
    name: in-cluster
    namespace: nginx-ingress
  project: default
  source:
    repoURL: https://helm.nginx.com/stable
    chart: nginx-ingress
    targetRevision: 1.4.0
    helm:
      values: |
        controller:
          ingressClass:
            create: true
            name: nginx
            setAsDefaultIngress: true
          service:
            type: LoadBalancer
            annotations:
              load-balancer.hetzner.cloud/name: vdgt-k3s-nginx
              load-balancer.hetzner.cloud/use-private-ip: "false"
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
    - CreateNamespace=true
