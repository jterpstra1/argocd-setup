apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bootstrap-cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-20"
spec:
  destination:
    name: in-cluster
    namespace: cert-manager
  project: default
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.17.2
    helm:
      values: |
        installCRDs: true
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
    - CreateNamespace=true
